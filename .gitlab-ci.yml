default:
  before_script:
    - python3 -m pip install -e .[dev]
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
stages:
  - stage_0
  - stage_1
RunTests:python_version=3.9:
  image: python:3.9
  tags:
    - bilkube
  stage: stage_0
  needs: []
  script:
    - PYTHONPATH=. luigi --module utils.pipeline RunTests --RunTests-python_version=3.9 --local-scheduler
RunTests:python_version=3.10:
  image: python:3.10
  tags:
    - bilkube
  stage: stage_0
  needs: []
  script:
    - PYTHONPATH=. luigi --module utils.pipeline RunTests --RunTests-python_version=3.10 --local-scheduler
