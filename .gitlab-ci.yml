RunTests:python_version=3.14:
  image: python:3.14
  tags:
    - bilkube
  stage: stage_0
  needs: []
  script:
    - PYTHONPATH=. luigi --module utils.pipeline RunTests --RunTests-python_version=3.14 --local-scheduler
Pipeline:
  stage: stage_1
  needs:
    - RunTests:python_version=3.10
    - RunTests:python_version=3.11
    - RunTests:python_version=3.12
    - RunTests:python_version=3.13
    - RunTests:python_version=3.14
    - RunTests:python_version=3.9
  script:
    - PYTHONPATH=. luigi --module utils.pipeline Pipeline --local-scheduler
