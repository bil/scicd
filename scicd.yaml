workspace:
  platform: gitlab
  url: https://code.stanford.edu
  project: bil/code/2603_scicd
  cicd:
    default:
      image: python:3.10
      before_script:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest pytest-mock
      - pip install -e .
    workflow:
      rules:
      - if: '$CI_PIPELINE_SOURCE == "push"'
cpu: 1
memory: 4Gi
retry: 0
tags: [ "bilkube" ]
