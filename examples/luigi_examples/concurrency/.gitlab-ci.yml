default:
  before_script:
    - pip install luigi numpy
stages:
  - stage_0
  - stage_1
  - stage_2
RandomNumbers:n=10:
  image: python:3.12
  tags:
    - pc
  stage: stage_0
  variables:
    PATH_OUTPUT: /scratch/tmp/pc
  needs: []
  script:
    - PYTHONPATH=. luigi --module workflow RandomNumbers --RandomNumbers-n=10 --local-scheduler
