# SCICD Project Configuration
# -----------------------------------------------------------------------------
# [1] INFRASTRUCTURE (Workspace-Wide)
# -----------------------------------------------------------------------------

storage:
  output: "data"   # Root directory for local analysis results
  remote: "your_rclone_remote:path/to/project" # Remote rclone storage root
  use_branch: true    # Isolate results in subfolders by git branch name

gitlab:
  url: "https://gitlab.com" # Your GitLab instance URL
  project: "your-namespace/your-project" # Full project path (namespace/name)

# [2] EXECUTION (Module-Overridable Defaults)
# -----------------------------------------------------------------------------

logging:
  verbose: true       # Print EXEC/DONE status and output paths

gcp:
  project: "your-gcp-project-id" # GCP Project for distributed queue
  pubsub_topic: "your-topic"    # Topic for publishing task inputs
  pubsub_subscription: "your-subscription" # Subscription for workers

joblib:
  backend: "loky"     # Default parallel backend for ThreadManager
  verbose: 10         # Joblib's internal verbosity (0-10)

ci:
  # Root-level settings for the generated GitLab CI/CD pipeline
  default:
    image: "python:3.10" # Default container for CI jobs
    before_script:
      - apt-get update && apt-get install -y rclone
      - pip install -e .
      - ./script/install_deps.sh
  variables:
    KUBERNETES_CPU_REQUEST: 1
    KUBERNETES_MEMORY_REQUEST: 4Gi
    PYTHONUNBUFFERED: "1"
  workflow:
    rules:
      - if: '$CI_PIPELINE_SOURCE == "push"'
        when: never
      - when: always

concurrency:
  local:
    method: "thread"  # Strategy: thread, slice, queue, matrix
    workers: 2        # Parallelism degree (CPUs/Workers)
  gitlab:
    method: "matrix"  # Matrix maps tasks 1:1 to CI jobs

