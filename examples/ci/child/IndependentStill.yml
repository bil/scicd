
IndependentStill:dispatch:
  parallel: 2
  script:
  - scicd dispatch_module IndependentStill --method=slice
  stage: dispatch

default:
  before_script:
  - apt-get update && apt-get install -y rclone
  - pip install -e .
  - ./script/install_deps.sh
  image: python:3.10
  tags:
  - $RUNNER

stages:
- dispatch

variables:
  KUBERNETES_CPU_REQUEST: 1
  KUBERNETES_MEMORY_REQUEST: 4Gi
  PYTHONUNBUFFERED: '1'

workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
    when: never
  - when: always
