
Hello:name=Universe:
  script:
  - scicd dispatch_module Hello --method=matrix
  stage: dispatch
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_NODE_SELECTOR_FAMILY: cloud.google.com/machine-family=c2
    SCICD_INPUT: '{"name": "Universe"}'

Hello:name=World:
  script:
  - scicd dispatch_module Hello --method=matrix
  stage: dispatch
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_NODE_SELECTOR_FAMILY: cloud.google.com/machine-family=c2
    SCICD_INPUT: '{"name": "World"}'

default:
  before_script:
  - apt-get update && apt-get install -y rclone
  - pip install -e .
  - ./script/install_deps.sh
  image: python:3.10
  tags:
  - $RUNNER

stages:
- dispatch

variables:
  KUBERNETES_CPU_REQUEST: 1
  KUBERNETES_MEMORY_REQUEST: 4Gi
  KUBERNETES_NODE_SELECTOR_FAMILY: cloud.google.com/machine-family=c2
  PYTHONUNBUFFERED: '1'

workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
    when: never
  - when: always
