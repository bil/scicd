
Hello:__push__:
  needs:
  - job: Hello:run
    optional: true
  resource_group: remote_storage
  rules: &id001
  - if: $REQUESTED_MODULES =~ /.*:Hello:.*/ || $TRIGGER_ALL == 'true'
  script:
  - scicd push_data --path=hello_world --folders_first=True
  stage: Hello
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_NODE_SELECTOR_FAMILY: cloud.google.com/machine-family=c2

Hello:run:
  needs:
  - job: __pull__
    optional: true
  - job: PubsubExample:__push__
    optional: true
  rules: *id001
  stage: Hello
  trigger:
    forward:
      pipeline_variables: true
    include:
    - ci/child/Hello.yml
    strategy: depend
  variables:
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_NODE_SELECTOR_FAMILY: cloud.google.com/machine-family=c2

