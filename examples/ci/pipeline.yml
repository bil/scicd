__pull__:
  resource_group: remote_storage
  rules:
  - if: $TRIGGER_PULL == 'true'
  script:
  - scicd pull_data
  stage: __pull__

default:
  before_script:
  - apt-get update && apt-get install -y rclone
  - ./script/install_deps.sh
  image: python:3.10
  tags:
  - $RUNNER

variables:
  KUBERNETES_CPU_REQUEST: 1
  KUBERNETES_MEMORY_REQUEST: 4Gi
  PYTHONUNBUFFERED: '1'

workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
    when: never
  - when: always
