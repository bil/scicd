default:
  before_script:
    - python3 -m pip install -e .[test]
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
stages:
  - stage_0
  - stage_1
GenerateWords:words=["apple","banana","grapefruit"]:
  image: python:3.10
  tags:
    - bilkube
  stage: stage_0
  needs: []
  script:
    - PYTHONPATH=. luigi --module tests.luigi.simple GenerateWords --GenerateWords-words='["apple", "banana", "grapefruit"]' --local-scheduler
CountLetters:
  image: python:3.10
  tags:
    - bilkube
  stage: stage_1
  needs:
    - GenerateWords:words=["apple","banana","grapefruit"]
  script:
    - PYTHONPATH=. luigi --module tests.luigi.simple CountLetters --local-scheduler
